<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js' integrity='sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==' crossorigin='anonymous'></script>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Slackey&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <h1>Chat</h1>
        <button class="auth">🔑</button>
    </header>
    <main>
        <ul class="messages">
            <li>Hello</li>
            <li>How are you</li>
        </ul>
    </main>
    <form id="form"><input type="text" id="input" placeholder="Enter your message">
        <button type="submit">Send</button>
    </form>
</body>
</html>
